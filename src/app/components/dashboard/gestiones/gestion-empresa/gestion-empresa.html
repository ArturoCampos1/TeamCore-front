<div class="content">
    <h3>Gestiona tu Plataforma</h3>
    <p class="descripcion">Edita y revisa todos los datos de tu Compañía</p>

    <div class="contenido-empresa">
        <div class="tarjeta">
        <h3>Empresa</h3>
        <form class="tarjeta-cuerpo" [formGroup]="formEmpresa">

            <div class="campo-grupo">
            <label>Nombre de la empresa</label>
            <input type="text" formControlName="nombreEmpresa" placeholder="Ej. Acme S.L.">
            </div>

            <div class="campo-grupo">
            <label>CIF</label>
            <input type="text" formControlName="cif" placeholder="Ej. B12345678">
            </div>
        
            <div class="campo-grupo">
            <label>Fecha de salida</label>
            <input type="date" formControlName="fechaSalida">
            </div>

            <div class="campo-grupo campo-ancho-completo">
            <label>Área de Trabajo</label>
            <select formControlName="areaTrabajo">
                <option disabled selected>Selecciona un área</option>
                <option>Administración</option>
                <option>Recursos Humanos</option>
                <option>Finanzas</option>
                <option>Contabilidad</option>
                <option>Marketing</option>
                <option>Marketing Digital</option>
                <option>Ventas</option>
                <option>Atención al Cliente</option>
                <option>Soporte Técnico</option>
                <option>Desarrollo de Software</option>
                <option>Diseño UX/UI</option>
                <option>Diseño Gráfico</option>
                <option>Producto</option>
                <option>Gestión de Proyectos</option>
                <option>Logística</option>
                <option>Operaciones</option>
                <option>Legal</option>
                <option>IT / Sistemas</option>
                <option>Formación</option>
            </select>
            </div>

            <div class="campo-grupo campo-ancho-completo">
            <label>Datos</label>
            <textarea formControlName="datos" placeholder="Información adicional sobre la empresa..."></textarea>
            </div>

        </form>
        </div>
        <div class="sedes">
            <h3>Sedes</h3>

        <form class="card-sedes" [formGroup]="formEmpresa">

            <div formArrayName="sedes">

                <div 
                class="sede-grid"
                *ngFor="let sede of sedes.controls; let i = index"
                [formGroupName]="i"
                >

                <div class="input-box nombre-sede">
                    <label>Nombre del edificio / sede</label>
                    <input type="text" formControlName="nombreSede">
                </div>

                <div class="input-box pais">
                    <label>País</label>
                    <input type="text" formControlName="pais">
                </div>

                <div class="input-box ciudad">
                    <label>Ciudad</label>
                    <input type="text" formControlName="ciudad">
                </div>

                <div class="input-box postal">
                    <label>Código postal</label>
                    <input type="text" formControlName="codigoPostal">
                </div>

                <div class="input-box direccion">
                    <label>Dirección</label>
                    <input type="text" formControlName="direccion">
                </div>

                <div class="geo-grid">

                    <div class="input-box">
                    <label>Latitud</label>
                    <input type="text" formControlName="latitud">
                    </div>

                    <div class="input-box">
                    <label>Longitud</label>
                    <input type="text" formControlName="longitud">
                    </div>

                </div>

                </div>

            </div>

            </form>
        </div>

</div>
