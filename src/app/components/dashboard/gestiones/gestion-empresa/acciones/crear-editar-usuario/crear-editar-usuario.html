<div class="content">
  <h3>Creación / Edición de empleado</h3>

  <form [formGroup]="usuarioForm" (ngSubmit)="guardarUsuario()">

    <div class="form-grid">

      <!-- Nombre -->
      <div class="form-group">
        <label>Nombre de usuario *</label>
        <input type="text" formControlName="nombreUsuario">

        <small
          *ngIf="usuarioForm.get('nombreUsuario')?.invalid &&
                 usuarioForm.get('nombreUsuario')?.touched">
          El nombre es obligatorio y debe tener mínimo 3 caracteres.
        </small>
      </div>

      <!-- DNI -->
      <div class="form-group">
        <label>DNI *</label>
        <input type="text" formControlName="dni">

        <small
          *ngIf="usuarioForm.get('dni')?.invalid &&
                 usuarioForm.get('dni')?.touched">
          Introduce un DNI válido.
        </small>
      </div>

      <!-- Password -->
      <div class="form-group">
        <label>Contraseña *</label>
        <input type="password" formControlName="password">

        <small
          *ngIf="usuarioForm.get('password')?.invalid &&
                 usuarioForm.get('password')?.touched">
          Mínimo 6 caracteres.
        </small>
      </div>

      <!-- Puesto -->
      <div class="form-group">
        <label>Puesto</label>
        <input type="text" formControlName="puesto">
      </div>

      <!-- Correo -->
      <div class="form-group">
        <label>Correo electrónico</label>
        <input type="email" formControlName="correo">

        <small
          *ngIf="usuarioForm.get('correo')?.invalid &&
                 usuarioForm.get('correo')?.touched">
          Correo inválido.
        </small>
      </div>

      <!-- Teléfono -->
      <div class="form-group">
        <label>Teléfono</label>
        <input type="text" formControlName="numeroTelefono">

        <small
          *ngIf="usuarioForm.get('numeroTelefono')?.invalid &&
                 usuarioForm.get('numeroTelefono')?.touched">
          Número inválido.
        </small>
      </div>

      <!-- Dirección -->
      <div class="form-group full-width">
        <label>Dirección</label>
        <input type="text" formControlName="direccion">
      </div>

      <!-- IBAN -->
      <div class="form-group">
        <label>IBAN</label>
        <input type="text" formControlName="iban">

        <small
          *ngIf="usuarioForm.get('iban')?.invalid &&
                 usuarioForm.get('iban')?.touched">
          IBAN inválido.
        </small>
      </div>

      <!-- Seguridad Social -->
      <div class="form-group">
        <label>Nº Seguridad Social</label>
        <input type="text" formControlName="numSeguridadSocial">
      </div>

      <!-- Salario -->
      <div class="form-group">
        <label>Salario bruto</label>
        <input type="number" formControlName="salarioBruto">
      </div>

      <!-- Horas -->
      <div class="form-group">
        <label>Horas semanales</label>
        <input type="number" formControlName="horasSemanales">
      </div>

      <!-- Vacaciones -->
      <div class="form-group">
        <label>Días de vacaciones</label>
        <input
          type="number"
          formControlName="diasVacacionesDisponibles"
          readonly>
      </div>

      <!-- Fecha entrada -->
      <div class="form-group">
        <label>Fecha entrada</label>
        <input type="date" formControlName="fechaEntrada">
      </div>

      <!-- Fecha salida -->
      <div class="form-group">
        <label>Fecha salida</label>
        <input type="date" formControlName="fechaSalida">
      </div>

      <!-- Roles -->
      <div class="form-group">
        <label>Rol *</label>

        <select formControlName="roles">
          <option value="">Selecciona un rol</option>
          <option *ngFor="let rol of rolesDisponibles" [value]="rol">
            {{ rol }}
          </option>
        </select>

        <small
          *ngIf="usuarioForm.get('roles')?.invalid &&
                 usuarioForm.get('roles')?.touched">
          Debes seleccionar un rol.
        </small>
      </div>

    </div>

    <div class="actions">
      <button routerLink="/admin/empresa/verUsuarios">Volver</button>
      <button type="submit">Guardar usuario</button>
    </div>

  </form>
</div>
