<div class="container">

    <!-- HEADER -->
    <div class="header">
        <div routerLink="/landing" class="header-title">
            <img src="assets/teamcorelogo.png" width="60px" alt="Logo de TeamCore">
            <h2>TeamCore</h2>
        </div>
        <div>
            <button routerLink="/landing/inicio-sesion" class="btn-inicio">Inicio de Sesión</button>
            <button routerLink="/landing/registro" class="btn-registro">Registro</button>
        </div>
    </div>

    <!-- INICIO SESION-->
     <div class="inicioSesion">
        <h3 class="title">¡Bienvenido de vuelta!</h3>
        <p>Introduce tus creedenciales para acceder a <span class="teamcore">TeamCore</span></p>

        <form class="formularioInicio" [formGroup]="formInicioSesion">

            <div class="input-group">
                <label for="dni">DNI </label>
                <input formControlName="dni" type="text" placeholder="12345678A">
            </div>

            <div class="input-group">
                <label for="contrasena">Contraseña </label>
                <input formControlName="contrasena" type="password" placeholder="••••••••">
            </div>

            <span *ngIf="formInicioSesion.get('dni')?.errors?.['required'] && formInicioSesion.get('contrasena')?.errors?.['required']" class="error">Ambos campos son requeridos</span>

            <button routerLink="/landing" class="btn-volver" type="button">Volver</button>
            <button (click)="onSubmit()" class="btn-siguiente" type="submit">Iniciar Sesión</button>
        </form>
     </div>
    
</div>
